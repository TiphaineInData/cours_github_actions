name: Pipeline (ingestion + dbt)

# Deux declencheurs :
on:
  workflow_dispatch:          # bouton "Run workflow" -> pour tester tout de suite
  schedule:
    - cron: "0 * * * *"       # toutes les heures (UTC) -> pour verifier le declenchement auto

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      # 1. Recuperer le code du depot
      - uses: actions/checkout@v5

      # 2. Installer Python
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # 3. Installer les dependances
      - name: Installer les dependances
        run: pip install -r requirements.txt

      # 4. Recreer la cle GCP a partir d'un secret GitHub
      - name: Ecrire la cle GCP
        run: echo '${{ secrets.GCP_SA_KEY }}' > "$GITHUB_WORKSPACE/cle_bigquery.json"

      # 5. Generer le profil dbt dans ~/.dbt (la ou dbt le cherche, comme en local)
      #    >>> LES 3 VALEURS A ADAPTER A VOTRE PROJET <<<
      - name: Configurer le profil dbt
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          dbt_ga:                          # <- nom du profil (dbt_project.yml)
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: data-quest-tiphaine   # <- VOTRE projet
                dataset: ga_test               # <- VOTRE dataset
                keyfile: $GITHUB_WORKSPACE/cle_bigquery.json
                location: US
                threads: 4
          EOF

      # 6. Lancer TOUT le pipeline (ingestion + dbt) en une commande
      - name: Lancer le pipeline
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/cle_bigquery.json
        run: python run_pipeline.py
